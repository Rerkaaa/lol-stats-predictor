name: Import Oracle's Elixir season

on:
  workflow_dispatch:
    inputs:
      year:
        description: "CSV season year, for example 2025"
        required: true
        type: string
      source_url:
        description: "Direct Oracle's Elixir CSV download URL"
        required: true
        type: string

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/import-oracle.mjs "${{ inputs.year }}" "${{ inputs.source_url }}"
        env:
          ORACLE_IMPORT_URL: ${{ secrets.ORACLE_IMPORT_URL }}
          ORACLE_IMPORT_TOKEN: ${{ secrets.ORACLE_IMPORT_TOKEN }}
