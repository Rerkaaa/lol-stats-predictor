name: Sync Oracle's Elixir data

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Season year. Leave blank to use the current Europe/Tirane year."
        required: false
        type: string
      max_games:
        description: "Safety limit for a test or phased import. Enter 2 for a test, 1500 for a backfill chunk, or leave blank for all changed games."
        required: false
        type: string
  schedule:
    # GitHub Actions uses UTC. One of these is 00:01 in Europe/Tirane across DST changes.
    - cron: "1 22 * * *"
    - cron: "1 23 * * *"

permissions:
  contents: read

concurrency:
  group: oracle-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Import from Oracle's public Drive folder
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_YEAR: ${{ inputs.year }}
          ORACLE_MAX_GAMES: ${{ inputs.max_games }}
          ORACLE_IMPORT_URL: ${{ secrets.ORACLE_IMPORT_URL }}
          ORACLE_IMPORT_TOKEN: ${{ secrets.ORACLE_IMPORT_TOKEN }}
        run: |
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            if ! node scripts/is-tirane-midnight.mjs; then
              echo "Not the Europe/Tirane midnight run; nothing to do."
              exit 0
            fi
            YEAR="$(node scripts/next-oracle-import-year.mjs)"
            SOURCE_URL="$(node scripts/resolve-oracle-drive-file.mjs "$YEAR")"
            ORACLE_MAX_GAMES="${ORACLE_MAX_GAMES:-1500}"
          else
            YEAR="$INPUT_YEAR"
            if [[ -z "$YEAR" ]]; then YEAR="$(node scripts/current-oracle-year.mjs)"; fi
            SOURCE_URL="$(node scripts/resolve-oracle-drive-file.mjs "$YEAR")"
          fi
          echo "Importing Oracle's Elixir season $YEAR (limit: ${ORACLE_MAX_GAMES:-all} changed games)"
          node scripts/import-oracle.mjs "$YEAR" "$SOURCE_URL"
